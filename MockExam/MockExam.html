<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockExam</title>
    <!-- docx & FileSaver CDNs for Word Export -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .exam-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .settings-container,
        .review-container {
            background-color: var(--card-bg);
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .settings-container {
            max-width: 400px;
        }

        .review-container {
            max-width: 800px;
            max-height: 90vh;
        }

        .review-container .exam-body {
            flex: 1;
            min-height: 0;
            /* 讓內容超出時可滑動，確保按鈕不會完全消失 */
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .exam-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exam-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .exam-meta {
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .exam-body {
            padding: 40px 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
            align-items: center;
            margin-bottom: 10px;
        }

        .difficulty-badge {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .question-id {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 15px;
        }

        .answer-input-container {
            margin-top: auto;
            margin-bottom: 10px;
        }

        .answer-input-container textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: var(--transition);
        }

        .answer-input-container textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .answer-section {
            background-color: #f7fafc;
            border-left: 4px solid #48bb78;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }

        .answer-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-title {
            font-weight: 700;
            color: #38a169;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2d3748;
        }

        .exam-footer {
            padding: 20px 30px;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: white;
            border: 1px solid #cbd5e0;
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }

        .btn:hover:not(:disabled) {
            background-color: #edf2f7;
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 6px 8px rgba(66, 153, 225, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .controls-right {
            display: flex;
            gap: 15px;
        }

        .loading,
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.95rem;
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .setting-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 題目進度條樣式 */
        .progress-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 20px 30px 0 30px;
            margin-bottom: -20px;
        }

        .grid-item {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .grid-item:hover {
            border-color: #cbd5e0;
            background-color: #f8fafc;
        }

        .grid-item.answered {
            background-color: #ebf8ff;
            border-color: #63b3ed;
            color: #2b6cb0;
        }

        .grid-item.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 5px rgba(66, 153, 225, 0.4);
        }

        .grid-item.answered.active {
            background-color: #3182ce;
            border-color: #3182ce;
            color: white;
        }

        /* 複習清單樣式 */
        .review-list {
            flex: 1;
            min-height: 150px;
            overflow-y: auto;
            /* 取消絕對的高度限制，改用 flex-grow 將剩餘空間填滿，確保底部按鈕可視 */
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fafbfc;
        }

        .review-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            gap: 15px;
            transition: background-color 0.2s;
            cursor: pointer;
            background: white;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .review-item:hover {
            background-color: #f1f5f9;
        }

        .review-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .review-item input[type="checkbox"] {
            margin-top: 5px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: var(--primary);
        }

        .review-item-content {
            flex: 1;
        }

        .review-item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .review-item-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ------------------------------------- */
        /* 行動裝置/手機版 響應式優化 (RWD)       */
        /* ------------------------------------- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
                /* 手機上靠上對齊，避免虛擬鍵盤擠壓 */
            }

            .exam-header {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
            }

            .exam-body {
                padding: 20px 15px;
                min-height: auto;
            }

            .question-text {
                font-size: 1.15rem;
            }

            .progress-grid {
                padding: 15px 15px 0 15px;
                justify-content: center;
            }

            .grid-item {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }

            .exam-footer {
                padding: 15px;
                flex-direction: column-reverse;
                /* 手機上將「上一題」排在最下面 */
                gap: 15px;
            }

            .controls-right {
                width: 100%;
                display: flex;
                gap: 10px;
            }

            .controls-right .btn {
                flex: 1;
                padding: 12px 5px;
                /* 加大按鈕點擊範圍 */
            }

            #prevBtn {
                width: 100%;
                padding: 12px 5px;
            }

            /* 設定表單 RWD */
            .form-control {
                padding: 15px 12px;
                font-size: 1.05rem;
            }

            /* 複習介面 RWD */
            .review-item {
                padding: 15px 10px;
                gap: 12px;
                align-items: center;
            }

            .review-item input[type="checkbox"] {
                transform: scale(1.5);
                margin-left: 5px;
                margin-right: 5px;
            }

            #reviewActionBtns {
                flex-direction: column-reverse;
                gap: 10px;
            }

            #reviewActionBtns .btn {
                width: 100%;
                flex: none !important;
                padding: 12px 10px;
            }
        }

        /* 特殊設定頁籤樣式 */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
            background: #f8fafc;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--primary-hover);
            background: #edf2f7;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .special-review-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            gap: 15px;
            background: white;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .special-review-item-content {
            flex: 1;
            min-width: 0;
        }

        .special-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 80px;
        }

        .special-option-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
        }

        .special-option-label:hover {
            background: #edf2f7;
        }

        .special-option-label.checked-must {
            background: #ebf8ff;
            border-color: #63b3ed;
            color: #2b6cb0;
        }

        .special-option-label.checked-exclude {
            background: #fff5f5;
            border-color: #fc8181;
            color: #c53030;
        }

        .special-option-label input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .special-option-label input.cb-must {
            accent-color: #3182ce;
        }

        .special-option-label input.cb-exclude {
            accent-color: #e53e3e;
        }
    </style>
</head>

<body>

    <!-- 考題設定介面 -->
    <div class="settings-container" id="settingsApp" style="display: none;">
        <div class="exam-header"
            style="justify-content: center; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);">
            <h1 style="font-size: 1.3rem;">設定測驗題數</h1>
        </div>
        <div class="exam-body" style="min-height: auto; padding: 30px;">
            <div class="form-group">
                <label for="easyCount">難度：易</label>
                <input type="number" id="easyCount" class="form-control" min="0" max="36" value="15">
                <div class="setting-desc">（最多 36 題，預設 15 題）</div>
            </div>
            <div class="form-group">
                <label for="mediumCount">難度：中</label>
                <input type="number" id="mediumCount" class="form-control" min="0" max="36" value="10">
                <div class="setting-desc">（最多 36 題，預設 10 題）</div>
            </div>
            <div class="form-group">
                <label for="hardCount">難度：難</label>
                <input type="number" id="hardCount" class="form-control" min="0" max="18" value="5">
                <div class="setting-desc">（最多 18 題，預設 5 題）</div>
            </div>
            <div id="settingsError" class="error-message" style="display: none;"></div>
            <button id="startExamBtn" class="btn btn-primary" style="width: 100%;">依設定開始隨機測驗</button>
            <button id="specialTestBtn" class="btn"
                style="width: 100%; margin-top: 10px; background-color: #e6fffa; color: #2c7a7b; border-color: #81e6d9; outline: none;">進階配題測驗</button>
            <button id="similarTestBtn" class="btn"
                style="width: 100%; margin-top: 10px; background-color: #ebf8ff; color: #2b6cb0; border-color: #90cdf4; outline: none;">相似題目比較</button>
            <button id="andOrTestBtn" class="btn"
                style="width: 100%; margin-top: 10px; background-color: #fffaf0; color: #dd6b20; border-color: #fbd38d; outline: none;">「及 or 與」加強</button>
            <div style="position: relative; text-align: center; margin: 15px 0;">
                <hr style="border: none; border-top: 1px solid #e2e8f0;">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #a0aec0; font-size: 0.85rem;">或</span>
            </div>
            <button id="openReviewBtn" class="btn"
                style="width: 100%; border-color: #ecc94b; color: #d69e2e; background-color: #fffffa;">不熟悉題目複習</button>
            <div style="position: relative; text-align: center; margin: 15px 0;">
                <hr style="border: none; border-top: 1px solid #e2e8f0;">
            </div>
            <a href="askgod/AskGod.html" class="btn"
                style="width: 100%; border-color: #e53e3e; color: #c53030; background-color: #fff5f5; text-decoration: none;">文昌帝君求籤</a>
        </div>
    </div>

    <!-- 複習選題介面 -->
    <div class="review-container" id="reviewApp" style="display: none;">
        <div class="exam-header" style="background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);">
            <h1 style="font-size: 1.3rem;">挑選不熟悉題目</h1>
            <div class="exam-meta" id="reviewCountMeta">已選：0 題</div>
        </div>
        <div class="exam-body" style="padding: 20px 30px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                <button id="selectAllBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #cbd5e0; background: #edf2f7;">全選</button>
                <button id="deselectAllBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #cbd5e0; background: #edf2f7;">取消所有</button>
                <button id="selectAllEasyBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #bee3f8; background: #ebf8ff; color: #2b6cb0;">全選易</button>
                <button id="selectAllMediumBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #c6f6d5; background: #f0fff4; color: #2f855a;">全選中</button>
                <button id="selectAllHardBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #fed7d7; background: #fff5f5; color: #c53030;">全選難</button>
            </div>
            <div id="reviewActionBtns" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="cancelReviewBtn" class="btn" style="flex: 1;">返回設定</button>
                <button id="startReviewExamBtn" class="btn btn-primary"
                    style="flex: 2; background-color: #ed8936; border-color: #ed8936;">進入複習模式測驗</button>
            </div>
            <div class="review-list" id="reviewListContainer" style="margin-bottom: 0;">
                <!-- JS 動態生成 -->
            </div>
        </div>
    </div>

    <!-- 特殊測驗介面 -->
    <div class="review-container" id="specialSetupApp" style="display: none;">
        <div class="exam-header" style="background: linear-gradient(135deg, #38b2ac 0%, #319795 100%);">
            <h1 style="font-size: 1.3rem;">特殊測驗設定</h1>
            <div class="exam-meta" id="specialCountMeta">必考: 0 | 不考: 0</div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="easy">容易</button>
            <button class="tab-btn" data-tab="medium">中等</button>
            <button class="tab-btn" data-tab="hard">困難</button>
        </div>

        <div class="exam-body" style="padding: 10px 30px 20px 30px; padding-top: 0;">
            <div id="specialActionBtns" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="cancelSpecialBtn" class="btn" style="flex: 1;">返回設定</button>
                <button id="startSpecialExamBtn" class="btn btn-primary"
                    style="flex: 2; background-color: #319795; border-color: #319795;">以此條件開始測驗</button>
            </div>

            <div class="review-list" style="margin-bottom: 0;">
                <div id="tab-easy" class="tab-content active"></div>
                <div id="tab-medium" class="tab-content"></div>
                <div id="tab-hard" class="tab-content"></div>
            </div>
        </div>
    </div>

    <!-- 測驗介面 -->
    <div class="exam-container" id="app" style="display: none;">
        <!-- JS 動態生成 -->
    </div>

    <script>
        // ----------------------------------------------------
        // 題數設定與抽題模組
        // ----------------------------------------------------
        class SettingsApp {
            constructor(onStartExam, onOpenReview, onStartSpecialExam, onStartSimilarExam, onStartAndOrExam) {
                this.settingsContainer = document.getElementById('settingsApp');
                this.easyCountInput = document.getElementById('easyCount');
                this.mediumCountInput = document.getElementById('mediumCount');
                this.hardCountInput = document.getElementById('hardCount');
                this.startExamBtn = document.getElementById('startExamBtn');
                this.specialTestBtn = document.getElementById('specialTestBtn');
                this.similarTestBtn = document.getElementById('similarTestBtn');
                this.andOrTestBtn = document.getElementById('andOrTestBtn');
                this.openReviewBtn = document.getElementById('openReviewBtn');
                this.settingsError = document.getElementById('settingsError');

                this.onStartExam = onStartExam;
                this.onOpenReview = onOpenReview;
                this.onStartSpecialExam = onStartSpecialExam;
                this.onStartSimilarExam = onStartSimilarExam;
                this.onStartAndOrExam = onStartAndOrExam;

                this.attachEventListeners();
            }

            attachEventListeners() {
                this.startExamBtn.addEventListener('click', () => this.handleStart());

                if (this.specialTestBtn) {
                    this.specialTestBtn.addEventListener('click', () => this.handleSpecialStart());
                }

                if (this.openReviewBtn) {
                    this.openReviewBtn.addEventListener('click', () => {
                        this.settingsContainer.style.display = 'none';
                        this.onOpenReview();
                    });
                }

                if (this.similarTestBtn) {
                    this.similarTestBtn.addEventListener('click', () => this.handleSimilarStart());
                }

                if (this.andOrTestBtn) {
                    this.andOrTestBtn.addEventListener('click', () => this.handleAndOrStart());
                }
            }

            async handleStart() {
                const easyReq = parseInt(this.easyCountInput.value) || 0;
                const mediumReq = parseInt(this.mediumCountInput.value) || 0;
                const hardReq = parseInt(this.hardCountInput.value) || 0;

                if (easyReq < 0 || easyReq > 36 || mediumReq < 0 || mediumReq > 36 || hardReq < 0 || hardReq > 18) {
                    this.showError('請確認各難度題數沒有超出上限設定或小於零！');
                    return;
                }

                if (easyReq + mediumReq + hardReq === 0) {
                    this.showError('抽題總數不能為 0！');
                    return;
                }

                this.startExamBtn.disabled = true;
                this.startExamBtn.textContent = '題庫載入中...';
                this.settingsError.style.display = 'none';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    const allQuestions = await response.json();

                    // 根據難度分類
                    const easyPool = allQuestions.filter(q => q.難度 === '易');
                    const mediumPool = allQuestions.filter(q => q.難度 === '中');
                    const hardPool = allQuestions.filter(q => q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'));

                    // 檢查可抽取的題數上限
                    const actualEasy = Math.min(easyReq, easyPool.length);
                    const actualMedium = Math.min(mediumReq, mediumPool.length);
                    const actualHard = Math.min(hardReq, hardPool.length);

                    // 亂數抽取不重複題目
                    const selectedEasy = this.shuffleArray(easyPool).slice(0, actualEasy);
                    const selectedMedium = this.shuffleArray(mediumPool).slice(0, actualMedium);
                    const selectedHard = this.shuffleArray(hardPool).slice(0, actualHard);

                    // 合併並再次打亂順序，避免題目只按照難度順序出現
                    const finalPaper = this.shuffleArray([...selectedEasy, ...selectedMedium, ...selectedHard]);

                    if (finalPaper.length === 0) {
                        this.showError('在目前題庫中找不到符合條件的題目。');
                        return;
                    }

                    this.settingsContainer.style.display = 'none';
                    this.onStartExam(finalPaper);
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('無法讀取 json/exam.json 題庫。<br>請確認您的題庫檔案存在，並在伺服器環境下開啟。');
                } finally {
                    this.startExamBtn.disabled = false;
                    this.startExamBtn.textContent = '依設定開始隨機測驗';
                }
            }

            async handleSpecialStart() {
                const easyReq = parseInt(this.easyCountInput.value) || 0;
                const mediumReq = parseInt(this.mediumCountInput.value) || 0;
                const hardReq = parseInt(this.hardCountInput.value) || 0;

                if (easyReq < 0 || easyReq > 36 || mediumReq < 0 || mediumReq > 36 || hardReq < 0 || hardReq > 18) {
                    this.showError('請確認各難度題數沒有超出上限設定或小於零！');
                    return;
                }

                if (easyReq + mediumReq + hardReq === 0) {
                    this.showError('抽題總數不能為 0！');
                    return;
                }

                // 將目前設定的題數帶給 onStartSpecialExam（這會負責開啟 SpecialSetupApp 介面）
                this.settingsError.style.display = 'none';
                this.settingsContainer.style.display = 'none';
                if (this.onStartSpecialExam) {
                    this.onStartSpecialExam({ easyReq, mediumReq, hardReq });
                }
            }

            shuffleArray(array) {
                const arr = [...array];
                let currentIndex = arr.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [arr[currentIndex], arr[randomIndex]] = [arr[randomIndex], arr[currentIndex]];
                }
                return arr;
            }

            showError(msg) {
                this.settingsError.innerHTML = msg;
                this.settingsError.style.display = 'block';
            }

            async handleSimilarStart() {
                if (this.similarTestBtn) {
                    this.similarTestBtn.disabled = true;
                    this.similarTestBtn.textContent = '題庫載入與分析中...';
                }
                this.settingsError.style.display = 'none';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    const allQuestions = await response.json();

                    // 分組邏輯
                    const groupedQuestions = this.findSimilarGroups(allQuestions);
                    
                    if (groupedQuestions.length === 0) {
                        this.showError('題庫中找不到符合條件的相似題目！');
                        return;
                    }

                    // 對群組順序洗牌，並對群組內部順序洗牌
                    const shuffledGroups = this.shuffleArray(groupedQuestions);
                    let finalPaper = [];
                    shuffledGroups.forEach(group => {
                        finalPaper = finalPaper.concat(this.shuffleArray(group));
                    });

                    this.settingsContainer.style.display = 'none';
                    if (this.onStartSimilarExam) {
                        this.onStartSimilarExam(finalPaper);
                    } else {
                        this.onStartExam(finalPaper);
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('無法讀取或分析題庫資料。');
                } finally {
                    if (this.similarTestBtn) {
                        this.similarTestBtn.disabled = false;
                        this.similarTestBtn.textContent = '相似題目比較';
                    }
                }
            }

            async handleAndOrStart() {
                if (this.andOrTestBtn) {
                    this.andOrTestBtn.disabled = true;
                    this.andOrTestBtn.textContent = '題庫載入與分析中...';
                }
                this.settingsError.style.display = 'none';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    const allQuestions = await response.json();

                    // 找出答案中包含「及」或「與」的題目
                    const filteredQuestions = allQuestions.filter(q => q.答案 && (q.答案.includes('及') || q.答案.includes('與')));
                    
                    if (filteredQuestions.length === 0) {
                        this.showError('題庫中找不到答案包含「及」或「與」的題目！');
                        return;
                    }

                    // 依照難易度排序 (易、中、難)，同難度再依題號排序
                    const diffWeight = { '易': 1, '中': 2, '難': 3 };
                    const finalPaper = filteredQuestions.sort((a, b) => {
                        const wA = diffWeight[a.難度] || 99;
                        const wB = diffWeight[b.難度] || 99;
                        if (wA !== wB) return wA - wB;

                        const idA = parseInt(a.題號 || 0);
                        const idB = parseInt(b.題號 || 0);
                        return idA - idB;
                    });

                    this.settingsContainer.style.display = 'none';
                    if (this.onStartAndOrExam) {
                        this.onStartAndOrExam(finalPaper);
                    } else {
                        this.onStartExam(finalPaper);
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('無法讀取或分析題庫資料。');
                } finally {
                    if (this.andOrTestBtn) {
                        this.andOrTestBtn.disabled = false;
                        this.andOrTestBtn.textContent = '「及 or 與」加強';
                    }
                }
            }

            findSimilarGroups(questions) {
                // 去除標點符號的 helper
                const cleanStr = (str) => {
                    if (!str) return "";
                    return str.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
                };

                // 取得兩字串的最大共同子字串長度
                const getLCSLength = (str1, str2) => {
                    const s1 = cleanStr(str1);
                    const s2 = cleanStr(str2);
                    let maxLen = 0;
                    for (let i = 0; i < s1.length; i++) {
                        for (let j = 0; j < s2.length; j++) {
                            let len = 0;
                            while (i + len < s1.length && j + len < s2.length && s1[i + len] === s2[j + len]) {
                                len++;
                            }
                            if (len > maxLen) maxLen = len;
                        }
                    }
                    return maxLen;
                };

                const parent = questions.map((_, i) => i);
                function find(i) {
                    if (parent[i] === i) return i;
                    return parent[i] = find(parent[i]);
                }
                function union(i, j) {
                    const rootI = find(i);
                    const rootJ = find(j);
                    if (rootI !== rootJ) parent[rootI] = rootJ;
                }

                // 建立 Disjoint Set (LCS >= 5 視為相似題)
                for (let i = 0; i < questions.length; i++) {
                    for (let j = i + 1; j < questions.length; j++) {
                        if (getLCSLength(questions[i].問題, questions[j].問題) >= 5) {
                            union(i, j);
                        }
                    }
                }

                // 將同組的題目收集起來
                const groupMap = {};
                for (let i = 0; i < questions.length; i++) {
                    const root = find(i);
                    if (!groupMap[root]) groupMap[root] = [];
                    groupMap[root].push(questions[i]);
                }

                // 只保留題數 > 1 的群組
                return Object.values(groupMap).filter(g => g.length > 1);
            }
        }

        class ReviewApp {
            constructor(onStartReviewExam, onCancel) {
                this.reviewContainer = document.getElementById('reviewApp');
                this.listContainer = document.getElementById('reviewListContainer');
                this.startBtn = document.getElementById('startReviewExamBtn');
                this.cancelBtn = document.getElementById('cancelReviewBtn');
                this.countMeta = document.getElementById('reviewCountMeta');

                this.selectAllBtn = document.getElementById('selectAllBtn');
                this.deselectAllBtn = document.getElementById('deselectAllBtn');
                this.selectAllEasyBtn = document.getElementById('selectAllEasyBtn');
                this.selectAllMediumBtn = document.getElementById('selectAllMediumBtn');
                this.selectAllHardBtn = document.getElementById('selectAllHardBtn');

                this.onStartReviewExam = onStartReviewExam;
                this.onCancel = onCancel;

                this.allQuestions = [];
                this.selectedIndexes = new Set();

                this.attachEventListeners();
            }

            attachEventListeners() {
                this.cancelBtn.addEventListener('click', () => {
                    this.reviewContainer.style.display = 'none';
                    this.onCancel();
                });

                this.startBtn.addEventListener('click', () => {
                    if (this.selectedIndexes.size === 0) {
                        alert('您還未選擇任何不熟悉的題目！');
                        return;
                    }

                    // 依照原先在畫面上排序好的陣列，抓取被勾選的題目
                    const sortedSelectedIndexes = Array.from(this.selectedIndexes).sort((a, b) => a - b);
                    const selectedDocs = sortedSelectedIndexes.map(idx => this.allQuestions[idx]);

                    this.reviewContainer.style.display = 'none';
                    this.onStartReviewExam(selectedDocs);
                });

                if (this.selectAllBtn) {
                    this.selectAllBtn.addEventListener('click', () => {
                        const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                        checkboxes.forEach(cb => {
                            cb.checked = true;
                            this.selectedIndexes.add(parseInt(cb.value));
                        });
                        this.updateCount();
                    });
                }

                if (this.deselectAllBtn) {
                    this.deselectAllBtn.addEventListener('click', () => {
                        const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                        checkboxes.forEach(cb => cb.checked = false);
                        this.selectedIndexes.clear();
                        this.updateCount();
                    });
                }

                const selectByDifficulty = (difficulty) => {
                    const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                    checkboxes.forEach(cb => {
                        const idx = parseInt(cb.value);
                        const q = this.allQuestions[idx];
                        let match = false;
                        if (difficulty === '易' && q.難度 === '易') match = true;
                        else if (difficulty === '中' && q.難度 === '中') match = true;
                        else if (difficulty === '難' && (q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'))) match = true;

                        if (match) {
                            cb.checked = true;
                            this.selectedIndexes.add(idx);
                        }
                    });
                    this.updateCount();
                };

                if (this.selectAllEasyBtn) {
                    this.selectAllEasyBtn.addEventListener('click', () => selectByDifficulty('易'));
                }
                if (this.selectAllMediumBtn) {
                    this.selectAllMediumBtn.addEventListener('click', () => selectByDifficulty('中'));
                }
                if (this.selectAllHardBtn) {
                    this.selectAllHardBtn.addEventListener('click', () => selectByDifficulty('難'));
                }
            }

            async loadAndShow() {
                this.listContainer.innerHTML = '<div style="text-align: center; color: #718096; padding: 20px;">正在讀取題庫內容...</div>';
                this.reviewContainer.style.display = 'flex';
                this.selectedIndexes.clear();
                this.updateCount();

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    let qs = await response.json();

                    // 1. 根據難易度排序 (易=1, 中=2, 難=3)
                    const diffWeight = { '易': 1, '中': 2, '難': 3 };

                    qs.sort((a, b) => {
                        const wA = diffWeight[a.難度] || 99;
                        const wB = diffWeight[b.難度] || 99;

                        if (wA !== wB) return wA - wB; // 先排難度

                        // 2. 若難度相同，則根據題號數字大小排序 ("01" -> 1)
                        const idA = parseInt(a.題號 || 0);
                        const idB = parseInt(b.題號 || 0);
                        return idA - idB; // 再排題號
                    });

                    this.allQuestions = qs;
                    this.renderList();
                } catch (error) {
                    this.listContainer.innerHTML = '<div style="color: #e53e3e; padding: 20px; text-align: center;">載入失敗，請確認伺服器與題庫存取狀態。</div>';
                }
            }

            renderList() {
                if (this.allQuestions.length === 0) {
                    this.listContainer.innerHTML = '<div style="padding: 20px; text-align: center;">題庫目前沒有任何題目</div>';
                    return;
                }

                let html = '';
                this.allQuestions.forEach((q, idx) => {
                    html += `
                        <label class="review-item">
                            <input type="checkbox" value="${idx}" class="review-checkbox">
                            <div class="review-item-content">
                                <div class="review-item-meta">
                                    <span class="difficulty-badge" style="padding: 2px 8px; font-size: 0.75rem;">${q.難度 || '未知'}</span>
                                    <span class="question-id" style="padding: 2px 8px; font-size: 0.75rem;">題號：${q.題號 || '未知'}</span>
                                </div>
                                <div class="review-item-text">${q.問題 ? q.問題.substring(0, 150) + (q.問題.length > 150 ? '...' : '') : '無題目內容'}</div>
                            </div>
                        </label>
                    `;
                });

                this.listContainer.innerHTML = html;

                // 綁定所有勾選框事件
                const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                checkboxes.forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.value);
                        if (e.target.checked) {
                            this.selectedIndexes.add(idx);
                        } else {
                            this.selectedIndexes.delete(idx);
                        }
                        this.updateCount();
                    });
                });
            }

            updateCount() {
                this.countMeta.textContent = `已選：${this.selectedIndexes.size} 題`;
            }
        }

        // ----------------------------------------------------
        // 特殊測驗挑選模組
        // ----------------------------------------------------
        class SpecialSetupApp {
            constructor(onStartExam, onCancel) {
                this.container = document.getElementById('specialSetupApp');
                this.startBtn = document.getElementById('startSpecialExamBtn');
                this.cancelBtn = document.getElementById('cancelSpecialBtn');
                this.countMeta = document.getElementById('specialCountMeta');

                this.tabBtns = document.querySelectorAll('#specialSetupApp .tab-btn');
                this.tabContents = document.querySelectorAll('#specialSetupApp .tab-content');

                this.onStartExam = onStartExam;
                this.onCancel = onCancel;

                this.allQuestions = [];
                // 儲存實際從 exam.json 的 original index 進行選取狀態的紀錄
                this.preferences = { must: [], exclude: [] };
                this.currentCounts = { easyReq: 15, mediumReq: 10, hardReq: 5 };

                this.loadPreferences();
                this.attachEventListeners();
            }

            loadPreferences() {
                try {
                    const saved = localStorage.getItem('mockExamPreferences');
                    if (saved) {
                        this.preferences = JSON.parse(saved);
                    }
                } catch (e) {
                    console.error('Failed to load preferences from localStorage', e);
                    this.preferences = { must: [], exclude: [] };
                }
            }

            savePreferences() {
                try {
                    localStorage.setItem('mockExamPreferences', JSON.stringify(this.preferences));
                } catch (e) {
                    console.error('Failed to save preferences to localStorage!', e);
                }
            }

            attachEventListeners() {
                this.cancelBtn.addEventListener('click', () => {
                    this.container.style.display = 'none';
                    this.onCancel();
                });

                this.startBtn.addEventListener('click', () => {
                    this.generateExam();
                });

                this.tabBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        // 移除所有 active
                        this.tabBtns.forEach(b => b.classList.remove('active'));
                        this.tabContents.forEach(c => c.classList.remove('active'));

                        // 加上 active
                        const targetTab = e.target.getAttribute('data-tab');
                        e.target.classList.add('active');
                        document.getElementById('tab-' + targetTab).classList.add('active');
                    });
                });
            }

            async loadAndShow(counts) {
                this.currentCounts = counts;
                this.container.style.display = 'flex';
                this.updateCount();

                document.getElementById('tab-easy').innerHTML = '<div style="padding: 20px; text-align: center;">載入中...</div>';
                document.getElementById('tab-medium').innerHTML = '<div style="padding: 20px; text-align: center;">載入中...</div>';
                document.getElementById('tab-hard').innerHTML = '<div style="padding: 20px; text-align: center;">載入中...</div>';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    let qs = await response.json();

                    // 保留原本的 idx 作為識別碼
                    this.allQuestions = qs.map((q, idx) => ({ ...q, originalIndex: idx }));

                    this.renderLists();
                } catch (error) {
                    document.getElementById('tab-easy').innerHTML = '<div style="color: #e53e3e; padding: 20px;">載入失敗</div>';
                    document.getElementById('tab-medium').innerHTML = '<div style="color: #e53e3e; padding: 20px;">載入失敗</div>';
                    document.getElementById('tab-hard').innerHTML = '<div style="color: #e53e3e; padding: 20px;">載入失敗</div>';
                }
            }

            renderLists() {
                const easyQs = this.allQuestions.filter(q => q.難度 === '易');
                const mediumQs = this.allQuestions.filter(q => q.難度 === '中');
                const hardQs = this.allQuestions.filter(q => q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'));

                const sortFn = (a, b) => parseInt(a.題號 || 0) - parseInt(b.題號 || 0);
                easyQs.sort(sortFn);
                mediumQs.sort(sortFn);
                hardQs.sort(sortFn);

                document.getElementById('tab-easy').innerHTML = this.buildHtmlList(easyQs);
                document.getElementById('tab-medium').innerHTML = this.buildHtmlList(mediumQs);
                document.getElementById('tab-hard').innerHTML = this.buildHtmlList(hardQs);

                this.bindCheckboxEvents();
            }

            buildHtmlList(questions) {
                if (questions.length === 0) return '<div style="padding: 20px; text-align: center;">無題目</div>';

                let html = '';
                questions.forEach(q => {
                    const idx = q.originalIndex;
                    const isMust = this.preferences.must.includes(idx);
                    const isExclude = this.preferences.exclude.includes(idx);

                    html += `
                        <div class="special-review-item">
                            <div class="special-review-item-content">
                                <div class="review-item-meta">
                                    <span class="difficulty-badge" style="padding: 2px 8px; font-size: 0.75rem;">${q.難度 || '未知'}</span>
                                    <span class="question-id" style="padding: 2px 8px; font-size: 0.75rem;">題號：${q.題號 || '未知'}</span>
                                </div>
                                <div class="review-item-text">${q.問題 ? q.問題.substring(0, 150) + (q.問題.length > 150 ? '...' : '') : '無題目內容'}</div>
                            </div>
                            <div class="special-options">
                                <label class="special-option-label ${isMust ? 'checked-must' : ''}" id="lbl-must-${idx}">
                                    <input type="checkbox" class="cb-must" data-idx="${idx}" ${isMust ? 'checked' : ''}> 必考
                                </label>
                                <label class="special-option-label ${isExclude ? 'checked-exclude' : ''}" id="lbl-exclude-${idx}">
                                    <input type="checkbox" class="cb-exclude" data-idx="${idx}" ${isExclude ? 'checked' : ''}> 不考
                                </label>
                            </div>
                        </div>
                    `;
                });
                return html;
            }

            bindCheckboxEvents() {
                const mustCbs = this.container.querySelectorAll('.cb-must');
                const excludeCbs = this.container.querySelectorAll('.cb-exclude');

                mustCbs.forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.getAttribute('data-idx'));
                        if (e.target.checked) {
                            // 新增必考，確保從不考移除
                            if (!this.preferences.must.includes(idx)) this.preferences.must.push(idx);
                            this.preferences.exclude = this.preferences.exclude.filter(id => id !== idx);

                            // 更新畫面其他 checkbox
                            const exCb = this.container.querySelector(`.cb-exclude[data-idx="${idx}"]`);
                            if (exCb) exCb.checked = false;
                        } else {
                            this.preferences.must = this.preferences.must.filter(id => id !== idx);
                        }
                        this.updateLabelStyles(idx);
                        this.savePreferences();
                        this.updateCount();
                    });
                });

                excludeCbs.forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.getAttribute('data-idx'));
                        if (e.target.checked) {
                            // 新增不考，確保從必考移除
                            if (!this.preferences.exclude.includes(idx)) this.preferences.exclude.push(idx);
                            this.preferences.must = this.preferences.must.filter(id => id !== idx);

                            // 更新畫面其他 checkbox
                            const mustCb = this.container.querySelector(`.cb-must[data-idx="${idx}"]`);
                            if (mustCb) mustCb.checked = false;
                        } else {
                            this.preferences.exclude = this.preferences.exclude.filter(id => id !== idx);
                        }
                        this.updateLabelStyles(idx);
                        this.savePreferences();
                        this.updateCount();
                    });
                });
            }

            updateLabelStyles(idx) {
                const isMust = this.preferences.must.includes(idx);
                const isExclude = this.preferences.exclude.includes(idx);

                const lblMust = document.getElementById(`lbl-must-${idx}`);
                const lblExclude = document.getElementById(`lbl-exclude-${idx}`);

                if (lblMust) {
                    if (isMust) lblMust.classList.add('checked-must');
                    else lblMust.classList.remove('checked-must');
                }

                if (lblExclude) {
                    if (isExclude) lblExclude.classList.add('checked-exclude');
                    else lblExclude.classList.remove('checked-exclude');
                }
            }

            updateCount() {
                this.countMeta.textContent = `必考: ${this.preferences.must.length} | 不考: ${this.preferences.exclude.length}`;
            }

            shuffleArray(array) {
                const arr = [...array];
                let currentIndex = arr.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [arr[currentIndex], arr[randomIndex]] = [arr[randomIndex], arr[currentIndex]];
                }
                return arr;
            }

            generateExam() {
                // 選項 A：維持首頁題數，優先提取必考題，補齊剩餘名額，去除不考題
                const easyPool = this.allQuestions.filter(q => q.難度 === '易');
                const mediumPool = this.allQuestions.filter(q => q.難度 === '中');
                const hardPool = this.allQuestions.filter(q => q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'));

                const generateForDifficulty = (pool, limit) => {
                    if (limit === 0) return [];

                    // 分解當前難度的題目為: 必考, 不考, 可抽
                    const poolMust = [];
                    const poolAvailable = [];

                    pool.forEach(q => {
                        const isMust = this.preferences.must.includes(q.originalIndex);
                        const isExclude = this.preferences.exclude.includes(q.originalIndex);

                        if (isMust) {
                            poolMust.push(q);
                        } else if (!isExclude) {
                            poolAvailable.push(q);
                        }
                    });

                    // 打亂必考題（以防必考數量大於 limit，雖然通常不該發生）
                    const shuffledMust = this.shuffleArray(poolMust);
                    const selectedMust = shuffledMust.slice(0, limit);

                    // 如果必考題已經超過或等於限制，就直接回傳
                    if (selectedMust.length >= limit) {
                        return selectedMust;
                    }

                    // 計算還需要幾題
                    const remainingLimit = limit - selectedMust.length;

                    // 從可用題庫隨機抽取
                    const shuffledAvailable = this.shuffleArray(poolAvailable);
                    const selectedAvailable = shuffledAvailable.slice(0, remainingLimit);

                    // 合併並打亂順序
                    return this.shuffleArray([...selectedMust, ...selectedAvailable]);
                };

                const finalEasy = generateForDifficulty(easyPool, this.currentCounts.easyReq);
                const finalMedium = generateForDifficulty(mediumPool, this.currentCounts.mediumReq);
                const finalHard = generateForDifficulty(hardPool, this.currentCounts.hardReq);

                const finalPaper = this.shuffleArray([...finalEasy, ...finalMedium, ...finalHard]);

                if (finalPaper.length === 0) {
                    alert('沒有題目可以產生！請檢查題數條件或不考比例。');
                    return;
                }

                this.container.style.display = 'none';
                this.onStartExam(finalPaper);
            }
        }

        // ----------------------------------------------------
        // 測驗功能模組
        // ----------------------------------------------------
        class MockExamApp {
            constructor(questions, isReviewMode = false, options = {}, onReturn) {
                this.questions = questions;
                this.isReviewMode = isReviewMode; // 如果是 true 則顯示「題號」以利對照複習
                this.isSpecialMode = options.isSpecialMode || false;
                this.hideDifficulty = options.hideDifficulty || false;
                this.isAndOrMode = options.isAndOrMode || false;
                this.onReturn = onReturn;
                this.currentIndex = 0;
                this.appElement = document.getElementById('app');
                this.answerShown = false;

                // 儲存每個題目的使用者作答內容
                this.userInputs = new Array(this.questions.length).fill('');

                // 攔截瀏覽器上一頁行為
                this.handlePopState = (e) => {
                    const confirmLeave = confirm('確定要結束目前測驗返回設定嗎？作答紀錄將會遺失。');
                    if (confirmLeave) {
                        window.removeEventListener('popstate', this.handlePopState);
                        this.appElement.style.display = 'none';
                        if (this.onReturn) this.onReturn();
                    } else {
                        // 使用者按取消，重新 pushState 以維持目前狀態
                        history.pushState({ page: 'exam' }, '', '');
                    }
                };
                history.pushState({ page: 'exam' }, '', '');
                window.addEventListener('popstate', this.handlePopState);

                this.render();
            }

            render() {
                const question = this.questions[this.currentIndex];

                // 產生進度條網格的 HTML
                const gridHtml = this.questions.map((_, idx) => {
                    let html = `
                    <div class="grid-item ${idx === this.currentIndex ? 'active' : ''} ${this.userInputs[idx].trim() !== '' ? 'answered' : ''}" 
                         id="grid-item-${idx}" 
                         data-index="${idx}">
                        ${idx + 1}
                    </div>
                    `;
                    // 若為隨機測驗測試模式，在第 25 題後插入分隔斷行
                    if (this.isSpecialMode && idx === 24) {
                        html += `<div style="flex-basis: 100%; height: 0; margin: 5px 0; border-bottom: 2px dashed #cbd5e0;"></div>`;
                    }
                    return html;
                }).join('');

                this.appElement.innerHTML = `
                    <div class="exam-header">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <button id="returnToSettingsBtn" style="background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 5px; border-radius: 4px; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='none'" title="結束測驗並返回">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            </button>
                            <h1>MockExam ${this.isReviewMode ? '(複習模式)' : ''}</h1>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button id="exportWordBtn" class="btn" style="padding: 4px 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; color: #2d3748; background-color: #f7fafc;" title="下載為 Word">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                輸出 Word
                            </button>
                            <div class="exam-meta">進度：${this.currentIndex + 1} / ${this.questions.length}</div>
                        </div>
                    </div>
                    <div class="progress-grid">
                        ${gridHtml}
                    </div>
                    <div class="exam-body">
                        <div class="question-meta" ${(this.hideDifficulty && !this.isReviewMode && !this.isAndOrMode) ? 'style="display: none;"' : ''}>
                            <span class="difficulty-badge" ${this.hideDifficulty ? 'style="display: none;"' : ''}>難度：${question.難度 || '未知'}</span>
                            ${(this.isReviewMode || this.isAndOrMode) ? `<span class="question-id">題號：${question.題號 || '未知'}</span>` : ''}
                        </div>
                        <div class="question-text">
                            ${question.問題 ? question.問題.replace(/\n/g, '<br>') : '無題目內容'}
                        </div>
                        
                        ${this.isAndOrMode ? '' : `
                        <div class="answer-input-container">
                            <textarea id="answerInput" placeholder="請在此輸入您的答案..."></textarea>
                        </div>
                        `}
                        
                        <div class="answer-section ${this.isAndOrMode ? 'show' : ''}" id="answerSection" ${this.isAndOrMode ? 'style="display: block; opacity: 1; transform: translateY(0);"' : ''}>
                            <div class="answer-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                                標準答案
                            </div>
                            <div class="answer-text">${this.formatAnswer(question.答案)}</div>
                        </div>
                    </div>
                    <div class="exam-footer">
                        <button class="btn" id="prevBtn" ${this.currentIndex === 0 ? 'disabled' : ''}>上一題</button>
                        <div class="controls-right">
                            ${this.isAndOrMode ? '' : `<button class="btn btn-primary" id="toggleAnswerBtn">顯示答案</button>`}
                            <button class="btn" id="nextBtn" ${this.currentIndex === this.questions.length - 1 ? 'disabled' : ''}>下一題</button>
                        </div>
                    </div>
                `;

                // 恢復使用者先前輸入的內容
                const answerInput = document.getElementById('answerInput');
                if (answerInput) {
                    answerInput.value = this.userInputs[this.currentIndex];
                }

                this.attachEventListeners();
                this.answerShown = false;
            }

            formatAnswer(text) {
                if (!text) return '無答案內容';
                let formatted = text.replace(/\n/g, '<br>');
                if (this.isAndOrMode) {
                    formatted = formatted.replace(/([及與])/g, '<span style="font-size: 1.5em; font-weight: bold; color: red;">$1</span>');
                }
                return formatted;
            }

            attachEventListeners() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
                const answerSection = document.getElementById('answerSection');
                const answerInput = document.getElementById('answerInput');
                const returnToSettingsBtn = document.getElementById('returnToSettingsBtn');
                const exportWordBtn = document.getElementById('exportWordBtn');

                if (exportWordBtn) {
                    exportWordBtn.addEventListener('click', () => this.exportToWord());
                }

                if (returnToSettingsBtn) {
                    returnToSettingsBtn.addEventListener('click', () => {
                        const confirmLeave = confirm('確定要結束目前測驗返回設定嗎？作答紀錄將會遺失。');
                        if (confirmLeave) {
                            window.removeEventListener('popstate', this.handlePopState);
                            history.back(); // 移除 pushed 的 state
                            this.appElement.style.display = 'none';
                            if (this.onReturn) this.onReturn();
                        }
                    });
                }

                // 進度格點擊切換
                const gridItems = document.querySelectorAll('.grid-item');
                gridItems.forEach(item => {
                    item.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.getAttribute('data-index'));
                        if (!isNaN(idx) && idx !== this.currentIndex) {
                            this.currentIndex = idx;
                            this.render();
                        }
                    });
                });

                // 即時記錄使用者的輸入並更新網格顏色
                if (answerInput) {
                    answerInput.addEventListener('input', (e) => {
                        this.userInputs[this.currentIndex] = e.target.value;
                        const currentGridItem = document.getElementById(`grid-item-${this.currentIndex}`);
                        if (currentGridItem) {
                            if (e.target.value.trim() !== '') {
                                currentGridItem.classList.add('answered');
                            } else {
                                currentGridItem.classList.remove('answered');
                            }
                        }
                    });
                }

                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (this.currentIndex > 0) {
                            this.currentIndex--;
                            this.render();
                        }
                    });
                }

                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (this.currentIndex < this.questions.length - 1) {
                            this.currentIndex++;
                            this.render();
                        }
                    });
                }

                if (toggleAnswerBtn && answerSection) {
                    toggleAnswerBtn.addEventListener('click', () => {
                        this.answerShown = !this.answerShown;
                        if (this.answerShown) {
                            answerSection.classList.add('show');
                            toggleAnswerBtn.textContent = '隱藏答案';
                            toggleAnswerBtn.classList.remove('btn-primary');
                        } else {
                            answerSection.classList.remove('show');
                            toggleAnswerBtn.textContent = '顯示答案';
                            toggleAnswerBtn.classList.add('btn-primary');
                        }
                    });
                }

                // 鍵盤導航
                document.onkeydown = (e) => {
                    // 若焦點在輸入框內作答，不要觸發捷徑
                    if (e.target.tagName.toLowerCase() === 'textarea' || e.target.tagName.toLowerCase() === 'input') {
                        return;
                    }

                    if (e.key === 'ArrowLeft') {
                        if (this.currentIndex > 0) {
                            this.currentIndex--;
                            this.render();
                        }
                    } else if (e.key === 'ArrowRight') {
                        if (this.currentIndex < this.questions.length - 1) {
                            this.currentIndex++;
                            this.render();
                        }
                    } else if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        if (toggleAnswerBtn) {
                            toggleAnswerBtn.click();
                        }
                    }
                };
            }

            async exportToWord() {
                const btn = document.getElementById('exportWordBtn');
                if (btn) {
                    btn.innerHTML = `處理中...`;
                    btn.disabled = true;
                }

                try {
                    const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = docx;



                    // Build questions
                    const questionParagraphs = [];
                    this.questions.forEach((q, idx) => {
                        const qNum = idx + 1;
                        const lines = q.問題 ? q.問題.split(/\r?\n/) : ['無題目內容'];

                        lines.forEach((line, lineIdx) => {
                            questionParagraphs.push(new Paragraph({
                                children: [
                                    new TextRun({
                                        text: lineIdx === 0 ? `${qNum}. ${line}` : line,
                                        bold: lineIdx === 0
                                    })
                                ],
                                spacing: { after: lineIdx === lines.length - 1 ? 0 : 100 }
                            }));
                        });

                        // blank space for answers
                        for (let i = 0; i < 4; i++) {
                            questionParagraphs.push(new Paragraph({ text: "", spacing: { after: 200 } }));
                        }
                    });

                    // Answer key page
                    const answerParagraphs = [
                        new Paragraph({
                            text: "解答附錄",
                            heading: HeadingLevel.HEADING_2,
                            alignment: AlignmentType.CENTER,
                            spacing: { after: 400 },
                            pageBreakBefore: true
                        })
                    ];

                    this.questions.forEach((q, idx) => {
                        const qNum = idx + 1;
                        const lines = q.答案 ? q.答案.split(/\r?\n/) : ['無答案內容'];

                        lines.forEach((line, lineIdx) => {
                            answerParagraphs.push(new Paragraph({
                                children: [
                                    new TextRun({
                                        text: lineIdx === 0 ? `${qNum}. ${line}` : line,
                                        bold: lineIdx === 0
                                    })
                                ],
                                spacing: { after: lineIdx === lines.length - 1 ? 200 : 100 }
                            }));
                        });
                    });

                    const doc = new Document({
                        sections: [{
                            properties: {},
                            children: [
                                ...questionParagraphs,
                                ...answerParagraphs
                            ],
                        }]
                    });

                    const blob = await Packer.toBlob(doc);
                    saveAs(blob, "MockExam_TestPaper.docx");
                } catch (err) {
                    console.error("Word 匯出發生錯誤:", err);
                    alert("匯出 Word 發生錯誤：" + err.message);
                } finally {
                    if (btn) {
                        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> 輸出 Word`;
                        btn.disabled = false;
                    }
                }
            }
        }

        // ----------------------------------------------------
        // 系統進入點 - 流程控制
        // ----------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            // 顯示設定介面
            const settingsEl = document.getElementById('settingsApp');
            settingsEl.style.display = 'flex';

            const appEl = document.getElementById('app');

            const backToSettings = () => {
                appEl.style.display = 'none';
                settingsEl.style.display = 'flex';
            };

            // 初始化設定流程與選題頁面
            const reviewApp = new ReviewApp(
                // onStartReviewExam (開始複習模式)
                (selectedQuestions) => {
                    appEl.style.display = 'flex';
                    new MockExamApp(selectedQuestions, true, {}, backToSettings); // true = 複習模式
                },
                // onCancel (返回設定選單)
                () => {
                    settingsEl.style.display = 'flex';
                }
            );

            // 準備 SpecialSetupApp
            const specialApp = new SpecialSetupApp(
                // 產生測驗後，進入 MockExamApp
                (selectedQuestions) => {
                    appEl.style.display = 'flex';
                    new MockExamApp(selectedQuestions, false, { isSpecialMode: true, hideDifficulty: true }, backToSettings);
                },
                // 返回設定
                () => {
                    settingsEl.style.display = 'flex';
                }
            );

            new SettingsApp(
                // onStartExam (一般隨機測驗模式)
                (selectedQuestions) => {
                    appEl.style.display = 'flex';
                    new MockExamApp(selectedQuestions, false, {}, backToSettings); // false = 一般題號隱藏模式
                },
                // onOpenReview (開啟複習介面)
                () => {
                    reviewApp.loadAndShow();
                },
                // onStartSpecialExam (隨機測驗測試模式 - 改為開啟選單)
                (counts) => {
                    specialApp.loadAndShow(counts);
                },
                // onStartSimilarExam (相似題目比較模式)
                (selectedQuestions) => {
                    appEl.style.display = 'flex';
                    new MockExamApp(selectedQuestions, false, { hideDifficulty: true }, backToSettings);
                },
                // onStartAndOrExam (及 or 與 加強模式)
                (selectedQuestions) => {
                    appEl.style.display = 'flex';
                    new MockExamApp(selectedQuestions, false, { isAndOrMode: true }, backToSettings);
                }
            );
        });
    </script>
