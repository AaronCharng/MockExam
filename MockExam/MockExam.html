<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockExam</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .exam-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .login-container,
        .settings-container,
        .review-container {
            background-color: var(--card-bg);
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .login-container,
        .settings-container {
            max-width: 400px;
        }

        .review-container {
            max-width: 800px;
            max-height: 90vh;
        }

        .review-container .exam-body {
            flex: 1;
            min-height: 0;
            /* 讓內容超出時可滑動，確保按鈕不會完全消失 */
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .exam-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exam-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .exam-meta {
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .exam-body {
            padding: 40px 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
            align-items: center;
            margin-bottom: 10px;
        }

        .difficulty-badge {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .question-id {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 15px;
        }

        .answer-input-container {
            margin-top: auto;
            margin-bottom: 10px;
        }

        .answer-input-container textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: var(--transition);
        }

        .answer-input-container textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .answer-section {
            background-color: #f7fafc;
            border-left: 4px solid #48bb78;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }

        .answer-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-title {
            font-weight: 700;
            color: #38a169;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2d3748;
        }

        .exam-footer {
            padding: 20px 30px;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: white;
            border: 1px solid #cbd5e0;
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }

        .btn:hover:not(:disabled) {
            background-color: #edf2f7;
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 6px 8px rgba(66, 153, 225, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .controls-right {
            display: flex;
            gap: 15px;
        }

        .loading,
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.95rem;
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .setting-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 題目進度條樣式 */
        .progress-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 20px 30px 0 30px;
            margin-bottom: -20px;
        }

        .grid-item {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .grid-item:hover {
            border-color: #cbd5e0;
            background-color: #f8fafc;
        }

        .grid-item.answered {
            background-color: #ebf8ff;
            border-color: #63b3ed;
            color: #2b6cb0;
        }

        .grid-item.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 5px rgba(66, 153, 225, 0.4);
        }

        .grid-item.answered.active {
            background-color: #3182ce;
            border-color: #3182ce;
            color: white;
        }

        /* 複習清單樣式 */
        .review-list {
            flex: 1;
            min-height: 150px;
            overflow-y: auto;
            /* 取消絕對的高度限制，改用 flex-grow 將剩餘空間填滿，確保底部按鈕可視 */
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fafbfc;
        }

        .review-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            gap: 15px;
            transition: background-color 0.2s;
            cursor: pointer;
            background: white;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .review-item:hover {
            background-color: #f1f5f9;
        }

        .review-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .review-item input[type="checkbox"] {
            margin-top: 5px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: var(--primary);
        }

        .review-item-content {
            flex: 1;
        }

        .review-item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .review-item-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ------------------------------------- */
        /* 行動裝置/手機版 響應式優化 (RWD)       */
        /* ------------------------------------- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
                /* 手機上靠上對齊，避免虛擬鍵盤擠壓 */
            }

            .exam-header {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
            }

            .exam-body {
                padding: 20px 15px;
                min-height: auto;
            }

            .question-text {
                font-size: 1.15rem;
            }

            .progress-grid {
                padding: 15px 15px 0 15px;
                justify-content: center;
            }

            .grid-item {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }

            .exam-footer {
                padding: 15px;
                flex-direction: column-reverse;
                /* 手機上將「上一題」排在最下面 */
                gap: 15px;
            }

            .controls-right {
                width: 100%;
                display: flex;
                gap: 10px;
            }

            .controls-right .btn {
                flex: 1;
                padding: 12px 5px;
                /* 加大按鈕點擊範圍 */
            }

            #prevBtn {
                width: 100%;
                padding: 12px 5px;
            }

            /* 登入、設定表單 RWD */
            .form-control {
                padding: 15px 12px;
                font-size: 1.05rem;
            }

            /* 複習介面 RWD */
            .review-item {
                padding: 15px 10px;
                gap: 12px;
                align-items: center;
            }

            .review-item input[type="checkbox"] {
                transform: scale(1.5);
                margin-left: 5px;
                margin-right: 5px;
            }

            #reviewActionBtns {
                flex-direction: column-reverse;
                gap: 10px;
            }

            #reviewActionBtns .btn {
                width: 100%;
                flex: none !important;
                padding: 12px 10px;
            }
        }
    </style>
</head>

<body>

    <!-- 登入介面 -->
    <div class="login-container" id="loginApp">
        <div class="exam-header" style="justify-content: center;">
            <h1 style="font-size: 1.3rem;">MockExam 系統登入</h1>
        </div>
        <div class="exam-body" style="min-height: auto; padding: 30px;">
            <div class="form-group">
                <label for="userId">帳號</label>
                <input type="text" id="userId" class="form-control" placeholder="請輸入帳號" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="userPw">密碼</label>
                <input type="password" id="userPw" class="form-control" placeholder="請輸入密碼">
            </div>
            <div id="loginError" class="error-message" style="display: none;"></div>
            <button id="loginBtn" class="btn btn-primary" style="width: 100%;">登入</button>
        </div>
    </div>

    <!-- 考題設定介面 -->
    <div class="settings-container" id="settingsApp" style="display: none;">
        <div class="exam-header"
            style="justify-content: center; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);">
            <h1 style="font-size: 1.3rem;">設定測驗題數</h1>
        </div>
        <div class="exam-body" style="min-height: auto; padding: 30px;">
            <div class="form-group">
                <label for="easyCount">難度：易</label>
                <input type="number" id="easyCount" class="form-control" min="0" max="36" value="15">
                <div class="setting-desc">（最多 36 題，預設 15 題）</div>
            </div>
            <div class="form-group">
                <label for="mediumCount">難度：中</label>
                <input type="number" id="mediumCount" class="form-control" min="0" max="36" value="10">
                <div class="setting-desc">（最多 36 題，預設 10 題）</div>
            </div>
            <div class="form-group">
                <label for="hardCount">難度：難</label>
                <input type="number" id="hardCount" class="form-control" min="0" max="18" value="5">
                <div class="setting-desc">（最多 18 題，預設 5 題）</div>
            </div>
            <div id="settingsError" class="error-message" style="display: none;"></div>
            <button id="startExamBtn" class="btn btn-primary" style="width: 100%;">依設定開始隨機測驗</button>
            <button id="specialTestBtn" class="btn" style="width: 100%; margin-top: 10px; background-color: #ffffff; color: #f4f6f8; border-color: #f4f6f8; outline: none;">隨機測驗測試</button>
            <div style="position: relative; text-align: center; margin: 15px 0;">
                <hr style="border: none; border-top: 1px solid #e2e8f0;">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #a0aec0; font-size: 0.85rem;">或</span>
            </div>
            <button id="openReviewBtn" class="btn"
                style="width: 100%; border-color: #ecc94b; color: #d69e2e; background-color: #fffffa;">不熟悉題目複習</button>
            <div style="position: relative; text-align: center; margin: 15px 0;">
                <hr style="border: none; border-top: 1px solid #e2e8f0;">
            </div>
            <a href="askgod/AskGod.html" class="btn"
                style="width: 100%; border-color: #e53e3e; color: #c53030; background-color: #fff5f5; text-decoration: none;">文昌帝君求籤</a>
        </div>
    </div>

    <!-- 複習選題介面 -->
    <div class="review-container" id="reviewApp" style="display: none;">
        <div class="exam-header" style="background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);">
            <h1 style="font-size: 1.3rem;">挑選不熟悉題目</h1>
            <div class="exam-meta" id="reviewCountMeta">已選：0 題</div>
        </div>
        <div class="exam-body" style="padding: 20px 30px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                <button id="selectAllBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #cbd5e0; background: #edf2f7;">全選</button>
                <button id="deselectAllBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #cbd5e0; background: #edf2f7;">取消所有</button>
                <button id="selectAllEasyBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #bee3f8; background: #ebf8ff; color: #2b6cb0;">全選易</button>
                <button id="selectAllMediumBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #c6f6d5; background: #f0fff4; color: #2f855a;">全選中</button>
                <button id="selectAllHardBtn" class="btn"
                    style="padding: 6px 15px; font-size: 0.85rem; border-color: #fed7d7; background: #fff5f5; color: #c53030;">全選難</button>
            </div>
            <div id="reviewActionBtns" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="cancelReviewBtn" class="btn" style="flex: 1;">返回設定</button>
                <button id="startReviewExamBtn" class="btn btn-primary"
                    style="flex: 2; background-color: #ed8936; border-color: #ed8936;">進入複習模式測驗</button>
            </div>
            <div class="review-list" id="reviewListContainer" style="margin-bottom: 0;">
                <!-- JS 動態生成 -->
            </div>
        </div>
    </div>

    <!-- 測驗介面 -->
    <div class="exam-container" id="app" style="display: none;">
        <!-- JS 動態生成 -->
    </div>

    <script>
        // ----------------------------------------------------
        // 登入功能模組
        // ----------------------------------------------------
        class LoginApp {
            constructor(onSuccess) {
                this.loginContainer = document.getElementById('loginApp');
                this.userIdInput = document.getElementById('userId');
                this.userPwInput = document.getElementById('userPw');
                this.loginBtn = document.getElementById('loginBtn');
                this.loginError = document.getElementById('loginError');
                this.onSuccess = onSuccess;

                // 檢查是否已有暫存登入資訊
                this.checkSession();
                this.attachEventListeners();
            }

            checkSession() {
                const sessionStr = sessionStorage.getItem('mockExamLogin');
                if (sessionStr) {
                    try {
                        const session = JSON.parse(sessionStr);
                        // 檢查是否超過設定的時間 (例如 2 小時)
                        if (session.expire > new Date().getTime()) {
                            this.loginContainer.style.display = 'none';
                            this.onSuccess();
                        } else {
                            sessionStorage.removeItem('mockExamLogin');
                        }
                    } catch (e) {
                        sessionStorage.removeItem('mockExamLogin');
                    }
                }
            }

            attachEventListeners() {
                this.loginBtn.addEventListener('click', () => this.handleLogin());
                this.userPwInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.handleLogin();
                });
                this.userIdInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.userPwInput.focus();
                });
            }

            async handleLogin() {
                const id = this.userIdInput.value.trim();
                const pw = this.userPwInput.value.trim();

                if (!id || !pw) {
                    this.showError('請輸入完整帳號與密碼');
                    return;
                }

                this.loginBtn.disabled = true;
                this.loginBtn.textContent = '驗證中...';
                this.loginError.style.display = 'none';

                try {
                    const response = await fetch('json/data.json');
                    if (!response.ok) {
                        throw new Error('無法取得驗證資料');
                    }
                    const users = await response.json();

                    const user = users.find(u => u.id === id && u.pw === pw);
                    if (user) {
                        // 記錄登入狀態 (設定 2 小時不過期)
                        const expireTime = new Date().getTime() + 2 * 60 * 60 * 1000;
                        sessionStorage.setItem('mockExamLogin', JSON.stringify({ expire: expireTime }));

                        this.loginContainer.style.display = 'none';
                        this.onSuccess();
                    } else {
                        this.showError('帳號或密碼錯誤');
                    }
                } catch (error) {
                    this.showError('無法讀取 json/data.json 進行驗證。<br>如果您是直接雙擊開啟網頁，請使用伺服器開啟以執行驗證。');
                } finally {
                    this.loginBtn.disabled = false;
                    this.loginBtn.textContent = '登入';
                }
            }

            showError(msg) {
                this.loginError.innerHTML = msg;
                this.loginError.style.display = 'block';
            }
        }

        // ----------------------------------------------------
        // 題數設定與抽題模組
        // ----------------------------------------------------
        class SettingsApp {
            constructor(onStartExam, onOpenReview, onStartSpecialExam) {
                this.settingsContainer = document.getElementById('settingsApp');
                this.easyCountInput = document.getElementById('easyCount');
                this.mediumCountInput = document.getElementById('mediumCount');
                this.hardCountInput = document.getElementById('hardCount');
                this.startExamBtn = document.getElementById('startExamBtn');
                this.specialTestBtn = document.getElementById('specialTestBtn');
                this.openReviewBtn = document.getElementById('openReviewBtn');
                this.settingsError = document.getElementById('settingsError');

                this.onStartExam = onStartExam;
                this.onOpenReview = onOpenReview;
                this.onStartSpecialExam = onStartSpecialExam;

                this.attachEventListeners();
            }

            attachEventListeners() {
                this.startExamBtn.addEventListener('click', () => this.handleStart());

                if (this.specialTestBtn) {
                    this.specialTestBtn.addEventListener('click', () => this.handleSpecialStart());
                }

                if (this.openReviewBtn) {
                    this.openReviewBtn.addEventListener('click', () => {
                        this.settingsContainer.style.display = 'none';
                        this.onOpenReview();
                    });
                }
            }

            async handleStart() {
                const easyReq = parseInt(this.easyCountInput.value) || 0;
                const mediumReq = parseInt(this.mediumCountInput.value) || 0;
                const hardReq = parseInt(this.hardCountInput.value) || 0;

                if (easyReq < 0 || easyReq > 36 || mediumReq < 0 || mediumReq > 36 || hardReq < 0 || hardReq > 18) {
                    this.showError('請確認各難度題數沒有超出上限設定或小於零！');
                    return;
                }

                if (easyReq + mediumReq + hardReq === 0) {
                    this.showError('抽題總數不能為 0！');
                    return;
                }

                this.startExamBtn.disabled = true;
                this.startExamBtn.textContent = '題庫載入中...';
                this.settingsError.style.display = 'none';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    const allQuestions = await response.json();

                    // 根據難度分類
                    const easyPool = allQuestions.filter(q => q.難度 === '易');
                    const mediumPool = allQuestions.filter(q => q.難度 === '中');
                    const hardPool = allQuestions.filter(q => q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'));

                    // 檢查可抽取的題數上限
                    const actualEasy = Math.min(easyReq, easyPool.length);
                    const actualMedium = Math.min(mediumReq, mediumPool.length);
                    const actualHard = Math.min(hardReq, hardPool.length);

                    // 亂數抽取不重複題目
                    const selectedEasy = this.shuffleArray(easyPool).slice(0, actualEasy);
                    const selectedMedium = this.shuffleArray(mediumPool).slice(0, actualMedium);
                    const selectedHard = this.shuffleArray(hardPool).slice(0, actualHard);

                    // 合併並再次打亂順序，避免題目只按照難度順序出現
                    const finalPaper = this.shuffleArray([...selectedEasy, ...selectedMedium, ...selectedHard]);

                    if (finalPaper.length === 0) {
                        this.showError('在目前題庫中找不到符合條件的題目。');
                        return;
                    }

                    this.settingsContainer.style.display = 'none';
                    this.onStartExam(finalPaper);
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('無法讀取 json/exam.json 題庫。<br>請確認您的題庫檔案存在，並在伺服器環境下開啟。');
                } finally {
                    this.startExamBtn.disabled = false;
                    this.startExamBtn.textContent = '依設定開始隨機測驗';
                }
            }

            async handleSpecialStart() {
                this.specialTestBtn.disabled = true;
                this.specialTestBtn.textContent = '題庫載入中...';
                this.settingsError.style.display = 'none';

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    const allQuestions = await response.json();

                    // 分類題庫
                    const easyPool = allQuestions.filter(q => q.難度 === '易');
                    const mediumPool = allQuestions.filter(q => q.難度 === '中');
                    const hardPool = allQuestions.filter(q => q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'));

                    // 前25題：簡單區隨機 15 題，中等區固定 10 題
                    const mediumFixedIds = [2, 4, 6, 7, 10, 13, 15, 16, 17, 18];
                    
                    const selectedEasy = this.shuffleArray(easyPool).slice(0, 15);
                    const selectedMedium = mediumPool.filter(q => mediumFixedIds.includes(parseInt(q.題號)));
                    
                    if (selectedMedium.length < 10) {
                         let remaining = 10 - selectedMedium.length;
                         const remainingPool = mediumPool.filter(q => !mediumFixedIds.includes(parseInt(q.題號)));
                         selectedMedium.push(...this.shuffleArray(remainingPool).slice(0, remaining));
                    }
                    
                    const block1 = this.shuffleArray([...selectedEasy, ...selectedMedium]);

                    // 後5題：困難區固定 4 題
                    const hardFixedIds = [5, 7, 16, 18];
                    const hardExcludeIds = [1, 2, 3, 4, 12];
                    
                    const selectedHardFixed = hardPool.filter(q => hardFixedIds.includes(parseInt(q.題號)));
                    const remainingHardPool = hardPool.filter(q => !hardFixedIds.includes(parseInt(q.題號)) && !hardExcludeIds.includes(parseInt(q.題號)));
                    
                    const selectedHardRandom = this.shuffleArray(remainingHardPool).slice(0, 5 - selectedHardFixed.length);
                    const block2 = this.shuffleArray([...selectedHardFixed, ...selectedHardRandom]);
                    
                    const finalPaper = [...block1, ...block2];

                    if (finalPaper.length === 0) {
                        this.showError('在目前題庫中找不到符合條件的題目。');
                        return;
                    }

                    this.settingsContainer.style.display = 'none';
                    if (this.onStartSpecialExam) {
                        this.onStartSpecialExam(finalPaper);
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('無法讀取 json/exam.json 題庫。<br>請確認您的題庫檔案存在，並在伺服器環境下開啟。');
                } finally {
                    this.specialTestBtn.disabled = false;
                    this.specialTestBtn.textContent = '隨機測驗測試';
                }
            }

            shuffleArray(array) {
                const arr = [...array];
                let currentIndex = arr.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [arr[currentIndex], arr[randomIndex]] = [arr[randomIndex], arr[currentIndex]];
                }
                return arr;
            }

            showError(msg) {
                this.settingsError.innerHTML = msg;
                this.settingsError.style.display = 'block';
            }
        }

        // ----------------------------------------------------
        // 不熟悉題庫挑選模組
        // ----------------------------------------------------
        class ReviewApp {
            constructor(onStartReviewExam, onCancel) {
                this.reviewContainer = document.getElementById('reviewApp');
                this.listContainer = document.getElementById('reviewListContainer');
                this.startBtn = document.getElementById('startReviewExamBtn');
                this.cancelBtn = document.getElementById('cancelReviewBtn');
                this.countMeta = document.getElementById('reviewCountMeta');

                this.selectAllBtn = document.getElementById('selectAllBtn');
                this.deselectAllBtn = document.getElementById('deselectAllBtn');
                this.selectAllEasyBtn = document.getElementById('selectAllEasyBtn');
                this.selectAllMediumBtn = document.getElementById('selectAllMediumBtn');
                this.selectAllHardBtn = document.getElementById('selectAllHardBtn');

                this.onStartReviewExam = onStartReviewExam;
                this.onCancel = onCancel;

                this.allQuestions = [];
                this.selectedIndexes = new Set();

                this.attachEventListeners();
            }

            attachEventListeners() {
                this.cancelBtn.addEventListener('click', () => {
                    this.reviewContainer.style.display = 'none';
                    this.onCancel();
                });

                this.startBtn.addEventListener('click', () => {
                    if (this.selectedIndexes.size === 0) {
                        alert('您還未選擇任何不熟悉的題目！');
                        return;
                    }

                    // 依照原先在畫面上排序好的陣列，抓取被勾選的題目
                    const sortedSelectedIndexes = Array.from(this.selectedIndexes).sort((a, b) => a - b);
                    const selectedDocs = sortedSelectedIndexes.map(idx => this.allQuestions[idx]);

                    this.reviewContainer.style.display = 'none';
                    this.onStartReviewExam(selectedDocs);
                });

                if (this.selectAllBtn) {
                    this.selectAllBtn.addEventListener('click', () => {
                        const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                        checkboxes.forEach(cb => {
                            cb.checked = true;
                            this.selectedIndexes.add(parseInt(cb.value));
                        });
                        this.updateCount();
                    });
                }

                if (this.deselectAllBtn) {
                    this.deselectAllBtn.addEventListener('click', () => {
                        const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                        checkboxes.forEach(cb => cb.checked = false);
                        this.selectedIndexes.clear();
                        this.updateCount();
                    });
                }

                const selectByDifficulty = (difficulty) => {
                    const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                    checkboxes.forEach(cb => {
                        const idx = parseInt(cb.value);
                        const q = this.allQuestions[idx];
                        let match = false;
                        if (difficulty === '易' && q.難度 === '易') match = true;
                        else if (difficulty === '中' && q.難度 === '中') match = true;
                        else if (difficulty === '難' && (q.難度 === '難' || (q.難度 !== '易' && q.難度 !== '中'))) match = true;

                        if (match) {
                            cb.checked = true;
                            this.selectedIndexes.add(idx);
                        }
                    });
                    this.updateCount();
                };

                if (this.selectAllEasyBtn) {
                    this.selectAllEasyBtn.addEventListener('click', () => selectByDifficulty('易'));
                }
                if (this.selectAllMediumBtn) {
                    this.selectAllMediumBtn.addEventListener('click', () => selectByDifficulty('中'));
                }
                if (this.selectAllHardBtn) {
                    this.selectAllHardBtn.addEventListener('click', () => selectByDifficulty('難'));
                }
            }

            async loadAndShow() {
                this.listContainer.innerHTML = '<div style="text-align: center; color: #718096; padding: 20px;">正在讀取題庫內容...</div>';
                this.reviewContainer.style.display = 'flex';
                this.selectedIndexes.clear();
                this.updateCount();

                try {
                    const response = await fetch('json/exam.json');
                    if (!response.ok) throw new Error('無法取得題庫資料');
                    let qs = await response.json();

                    // 1. 根據難易度排序 (易=1, 中=2, 難=3)
                    const diffWeight = { '易': 1, '中': 2, '難': 3 };

                    qs.sort((a, b) => {
                        const wA = diffWeight[a.難度] || 99;
                        const wB = diffWeight[b.難度] || 99;

                        if (wA !== wB) return wA - wB; // 先排難度

                        // 2. 若難度相同，則根據題號數字大小排序 ("01" -> 1)
                        const idA = parseInt(a.題號 || 0);
                        const idB = parseInt(b.題號 || 0);
                        return idA - idB; // 再排題號
                    });

                    this.allQuestions = qs;
                    this.renderList();
                } catch (error) {
                    this.listContainer.innerHTML = '<div style="color: #e53e3e; padding: 20px; text-align: center;">載入失敗，請確認伺服器與題庫存取狀態。</div>';
                }
            }

            renderList() {
                if (this.allQuestions.length === 0) {
                    this.listContainer.innerHTML = '<div style="padding: 20px; text-align: center;">題庫目前沒有任何題目</div>';
                    return;
                }

                let html = '';
                this.allQuestions.forEach((q, idx) => {
                    html += `
                        <label class="review-item">
                            <input type="checkbox" value="${idx}" class="review-checkbox">
                            <div class="review-item-content">
                                <div class="review-item-meta">
                                    <span class="difficulty-badge" style="padding: 2px 8px; font-size: 0.75rem;">${q.難度 || '未知'}</span>
                                    <span class="question-id" style="padding: 2px 8px; font-size: 0.75rem;">題號：${q.題號 || '未知'}</span>
                                </div>
                                <div class="review-item-text">${q.問題 ? q.問題.substring(0, 150) + (q.問題.length > 150 ? '...' : '') : '無題目內容'}</div>
                            </div>
                        </label>
                    `;
                });

                this.listContainer.innerHTML = html;

                // 綁定所有勾選框事件
                const checkboxes = this.listContainer.querySelectorAll('.review-checkbox');
                checkboxes.forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.value);
                        if (e.target.checked) {
                            this.selectedIndexes.add(idx);
                        } else {
                            this.selectedIndexes.delete(idx);
                        }
                        this.updateCount();
                    });
                });
            }

            updateCount() {
                this.countMeta.textContent = `已選：${this.selectedIndexes.size} 題`;
            }
        }

        // ----------------------------------------------------
        // 測驗功能模組
        // ----------------------------------------------------
        class MockExamApp {
            constructor(questions, isReviewMode = false, options = {}) {
                this.questions = questions;
                this.isReviewMode = isReviewMode; // 如果是 true 則顯示「題號」以利對照複習
                this.isSpecialMode = options.isSpecialMode || false;
                this.hideDifficulty = options.hideDifficulty || false;
                this.currentIndex = 0;
                this.appElement = document.getElementById('app');
                this.answerShown = false;

                // 儲存每個題目的使用者作答內容
                this.userInputs = new Array(this.questions.length).fill('');

                this.render();
            }

            render() {
                const question = this.questions[this.currentIndex];

                // 產生進度條網格的 HTML
                const gridHtml = this.questions.map((_, idx) => {
                    let html = `
                    <div class="grid-item ${idx === this.currentIndex ? 'active' : ''} ${this.userInputs[idx].trim() !== '' ? 'answered' : ''}" 
                         id="grid-item-${idx}" 
                         data-index="${idx}">
                        ${idx + 1}
                    </div>
                    `;
                    // 若為隨機測驗測試模式，在第 25 題後插入分隔斷行
                    if (this.isSpecialMode && idx === 24) {
                        html += `<div style="flex-basis: 100%; height: 0; margin: 5px 0; border-bottom: 2px dashed #cbd5e0;"></div>`;
                    }
                    return html;
                }).join('');

                this.appElement.innerHTML = `
                    <div class="exam-header">
                        <h1>MockExam ${this.isReviewMode ? '(複習模式)' : ''}</h1>
                        <div class="exam-meta">進度：${this.currentIndex + 1} / ${this.questions.length}</div>
                    </div>
                    <div class="progress-grid">
                        ${gridHtml}
                    </div>
                    <div class="exam-body">
                        <div class="question-meta" ${this.hideDifficulty && !this.isReviewMode ? 'style="display: none;"' : ''}>
                            <span class="difficulty-badge" ${this.hideDifficulty ? 'style="display: none;"' : ''}>難度：${question.難度 || '未知'}</span>
                            ${this.isReviewMode ? `<span class="question-id">題號：${question.題號 || '未知'}</span>` : ''}
                        </div>
                        <div class="question-text">
                            ${question.問題 ? question.問題.replace(/\n/g, '<br>') : '無題目內容'}
                        </div>
                        
                        <div class="answer-input-container">
                            <textarea id="answerInput" placeholder="請在此輸入您的答案..."></textarea>
                        </div>
                        
                        <div class="answer-section" id="answerSection">
                            <div class="answer-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                                標準答案
                            </div>
                            <div class="answer-text">${question.答案 ? question.答案.replace(/\n/g, '<br>') : '無答案內容'}</div>
                        </div>
                    </div>
                    <div class="exam-footer">
                        <button class="btn" id="prevBtn" ${this.currentIndex === 0 ? 'disabled' : ''}>上一題</button>
                        <div class="controls-right">
                            <button class="btn btn-primary" id="toggleAnswerBtn">顯示答案</button>
                            <button class="btn" id="nextBtn" ${this.currentIndex === this.questions.length - 1 ? 'disabled' : ''}>下一題</button>
                        </div>
                    </div>
                `;

                // 恢復使用者先前輸入的內容
                const answerInput = document.getElementById('answerInput');
                if (answerInput) {
                    answerInput.value = this.userInputs[this.currentIndex];
                }

                this.attachEventListeners();
                this.answerShown = false;
            }

            attachEventListeners() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
                const answerSection = document.getElementById('answerSection');
                const answerInput = document.getElementById('answerInput');

                // 進度格點擊切換
                const gridItems = document.querySelectorAll('.grid-item');
                gridItems.forEach(item => {
                    item.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.getAttribute('data-index'));
                        if (!isNaN(idx) && idx !== this.currentIndex) {
                            this.currentIndex = idx;
                            this.render();
                        }
                    });
                });

                // 即時記錄使用者的輸入並更新網格顏色
                if (answerInput) {
                    answerInput.addEventListener('input', (e) => {
                        this.userInputs[this.currentIndex] = e.target.value;
                        const currentGridItem = document.getElementById(`grid-item-${this.currentIndex}`);
                        if (currentGridItem) {
                            if (e.target.value.trim() !== '') {
                                currentGridItem.classList.add('answered');
                            } else {
                                currentGridItem.classList.remove('answered');
                            }
                        }
                    });
                }

                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (this.currentIndex > 0) {
                            this.currentIndex--;
                            this.render();
                        }
                    });
                }

                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (this.currentIndex < this.questions.length - 1) {
                            this.currentIndex++;
                            this.render();
                        }
                    });
                }

                if (toggleAnswerBtn && answerSection) {
                    toggleAnswerBtn.addEventListener('click', () => {
                        this.answerShown = !this.answerShown;
                        if (this.answerShown) {
                            answerSection.classList.add('show');
                            toggleAnswerBtn.textContent = '隱藏答案';
                            toggleAnswerBtn.classList.remove('btn-primary');
                        } else {
                            answerSection.classList.remove('show');
                            toggleAnswerBtn.textContent = '顯示答案';
                            toggleAnswerBtn.classList.add('btn-primary');
                        }
                    });
                }

                // 鍵盤導航
                document.onkeydown = (e) => {
                    // 若焦點在輸入框內作答，不要觸發捷徑
                    if (e.target.tagName.toLowerCase() === 'textarea' || e.target.tagName.toLowerCase() === 'input') {
                        return;
                    }

                    if (e.key === 'ArrowLeft') {
                        if (this.currentIndex > 0) {
                            this.currentIndex--;
                            this.render();
                        }
                    } else if (e.key === 'ArrowRight') {
                        if (this.currentIndex < this.questions.length - 1) {
                            this.currentIndex++;
                            this.render();
                        }
                    } else if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        if (toggleAnswerBtn) {
                            toggleAnswerBtn.click();
                        }
                    }
                };
            }
        }

        // ----------------------------------------------------
        // 系統進入點 - 流程控制
        // ----------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 初始化登入流程
            new LoginApp(() => {

                // 2. 登入成功，顯示設定介面
                const settingsEl = document.getElementById('settingsApp');
                settingsEl.style.display = 'flex';

                const appEl = document.getElementById('app');

                // 初始化設定流程與選題頁面
                const reviewApp = new ReviewApp(
                    // onStartReviewExam (開始複習模式)
                    (selectedQuestions) => {
                        appEl.style.display = 'flex';
                        new MockExamApp(selectedQuestions, true); // true = 複習模式
                    },
                    // onCancel (返回設定選單)
                    () => {
                        settingsEl.style.display = 'flex';
                    }
                );

                new SettingsApp(
                    // onStartExam (一般隨機測驗模式)
                    (selectedQuestions) => {
                        appEl.style.display = 'flex';
                        new MockExamApp(selectedQuestions, false); // false = 一般題號隱藏模式
                    },
                    // onOpenReview (開啟複習介面)
                    () => {
                        reviewApp.loadAndShow();
                    },
                    // onStartSpecialExam (隨機測驗測試模式)
                    (selectedQuestions) => {
                        appEl.style.display = 'flex';
                        new MockExamApp(selectedQuestions, false, { isSpecialMode: true, hideDifficulty: true });
                    }
                );
            });
        });
    </script>
